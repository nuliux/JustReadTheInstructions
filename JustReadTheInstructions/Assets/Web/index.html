<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Just Read The Instructions</title>
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>
    <h1>Just Read The Instructions</h1>
    <p id="error">Could not connect to KSP. Is the game running?</p>
    <p id="empty">No cameras open. Open or stream a hull camera in KSP first.</p>
    <div id="cameras"></div>

    <div id="copy-fallback" role="dialog" aria-modal="true" aria-labelledby="copy-fallback-title">
        <div class="copy-box">
            <div id="copy-fallback-title" class="copy-title">Clipboard blocked. Press Ctrl+C / Cmd+C, then Enter or
                close.</div>
            <input id="copy-input" type="text" readonly>
            <div class="copy-actions">
                <a id="copy-select-btn" class="btn" href="#">Select</a>
                <a id="copy-close-btn" class="btn" href="#">Close</a>
            </div>
        </div>
    </div>

    <script>
        const SNAPSHOT_REFRESH_MS = 2000;
        const CAMERA_SYNC_MS = 5000;
        const LOS_DELAY_MS = 3000;
        const LOS_OVERLAY_HTML = '<img src="/images/los.png" alt="Loss of Signal" style="max-width:100%;max-height:100%;object-fit:contain;">';
        const WAITING_OVERLAY_HTML = '<span style="font-size:1.8rem;line-height:1">&#x25CE;</span><span>Waiting for frames...</span>';

        const loading = {};
        const timers = {};
        const offlineSince = {};

        let copyFallbackEl;
        let copyInputEl;

        function ensureCopyFallback() {
            if (copyFallbackEl && copyInputEl) return;

            copyFallbackEl = document.getElementById('copy-fallback');
            copyInputEl = document.getElementById('copy-input');

            const closeBtn = document.getElementById('copy-close-btn');
            const selectBtn = document.getElementById('copy-select-btn');

            closeBtn?.addEventListener('click', e => {
                e.preventDefault();
                hideCopyFallback();
            });

            selectBtn?.addEventListener('click', e => {
                e.preventDefault();
                copyInputEl.focus();
                copyInputEl.select();
            });

            copyFallbackEl?.addEventListener('click', e => {
                if (e.target === copyFallbackEl) hideCopyFallback();
            });

            document.addEventListener('keydown', e => {
                if (!copyFallbackEl || copyFallbackEl.style.display !== 'flex') return;
                if (e.key === 'Escape' || e.key === 'Enter') hideCopyFallback();
            });
        }

        function showCopyFallback(text) {
            ensureCopyFallback();
            if (!copyFallbackEl || !copyInputEl) return;

            copyInputEl.value = text;
            copyFallbackEl.style.display = 'flex';
            copyInputEl.focus();
            copyInputEl.select();
        }

        function hideCopyFallback() {
            if (copyFallbackEl) copyFallbackEl.style.display = 'none';
        }

        async function fetchCameras() {
            const res = await fetch('/cameras');
            return res.json();
        }

        function snapshotUrl(id) {
            return `/camera/${id}/snapshot?t=${Date.now()}`;
        }

        async function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch {
                }
            }

            try {
                const el = document.createElement('textarea');
                el.value = text;
                el.setAttribute('readonly', '');
                el.style.position = 'absolute';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                const copied = document.execCommand('copy');
                document.body.removeChild(el);
                if (copied) return true;
            } catch {
            }

            showCopyFallback(text);
            return false;
        }

        function refreshSnapshot(card, id) {
            if (loading[id]) return;

            const img = card.querySelector('img');
            if (!img) return;

            loading[id] = true;

            const next = new Image();
            next.onload = () => {
                img.src = next.src;
                card.classList.remove('offline');
                delete offlineSince[id];
                const overlay = card.querySelector('.offline-overlay');
                if (overlay) overlay.innerHTML = WAITING_OVERLAY_HTML;
                loading[id] = false;
            };
            next.onerror = () => {
                if (!offlineSince[id]) offlineSince[id] = Date.now();
                card.classList.add('offline');
                loading[id] = false;
                const overlay = card.querySelector('.offline-overlay');
                if (overlay && Date.now() - offlineSince[id] >= LOS_DELAY_MS)
                    overlay.innerHTML = LOS_OVERLAY_HTML;
            };
            next.src = snapshotUrl(id);
        }

        function startRefresh(card, id) {
            if (timers[id]) return;
            refreshSnapshot(card, id);
            timers[id] = setInterval(() => refreshSnapshot(card, id), SNAPSHOT_REFRESH_MS);
        }

        function stopRefresh(id) {
            clearInterval(timers[id]);
            delete timers[id];
            delete loading[id];
            delete offlineSince[id];
        }

        function buildCard(cam) {
            const card = document.createElement('div');
            card.className = 'camera-card offline';
            card.dataset.id = cam.id;

            const preview = document.createElement('div');
            preview.className = 'preview';

            const img = document.createElement('img');
            img.alt = cam.name;

            const offlineOverlay = document.createElement('div');
            offlineOverlay.className = 'offline-overlay';
            offlineOverlay.innerHTML = WAITING_OVERLAY_HTML;

            preview.append(img, offlineOverlay);

            const info = document.createElement('div');
            info.className = 'camera-info';

            const name = document.createElement('span');
            name.className = 'camera-name';
            name.textContent = cam.name;

            const actions = document.createElement('div');
            actions.className = 'camera-actions';

            const watchBtn = document.createElement('a');
            watchBtn.className = cam.streaming ? 'btn watch' : 'btn watch-disabled';
            watchBtn.href = cam.streamUrl;
            watchBtn.target = '_blank';
            watchBtn.textContent = 'Watch';
            watchBtn.dataset.role = 'watch';

            const copyBtn = document.createElement('a');
            copyBtn.className = 'btn';
            copyBtn.textContent = 'Copy URL';
            copyBtn.href = '#';
            copyBtn.addEventListener('click', async e => {
                e.preventDefault();
                const ok = await copyToClipboard(location.origin + cam.streamUrl);
                copyBtn.textContent = ok ? 'Copied!' : 'Manual Copy';
                setTimeout(() => copyBtn.textContent = 'Copy URL', 1500);
            });

            actions.append(watchBtn, copyBtn);
            info.append(name, actions);
            card.append(preview, info);

            startRefresh(card, cam.id);

            return card;
        }

        function updateCard(card, cam) {
            const watchBtn = card.querySelector('[data-role="watch"]');
            if (watchBtn) {
                watchBtn.className = cam.streaming ? 'btn watch' : 'btn watch-disabled';
            }
        }

        async function sync() {
            let cameras;
            try {
                cameras = await fetchCameras();
                document.getElementById('error').style.display = 'none';
            } catch {
                document.getElementById('error').style.display = 'block';
                document.getElementById('empty').style.display = 'none';
                return;
            }

            const container = document.getElementById('cameras');
            document.getElementById('empty').style.display = cameras.length === 0 ? 'block' : 'none';

            const currentIds = new Set([...container.querySelectorAll('.camera-card')].map(c => Number(c.dataset.id)));
            const newIds = new Set(cameras.map(c => c.id));

            for (const id of currentIds) {
                if (!newIds.has(id)) {
                    container.querySelector(`.camera-card[data-id="${id}"]`)?.remove();
                    stopRefresh(id);
                }
            }

            for (const cam of cameras) {
                const existing = container.querySelector(`.camera-card[data-id="${cam.id}"]`);
                if (existing) {
                    updateCard(existing, cam);
                } else {
                    container.appendChild(buildCard(cam));
                }
            }
        }

        sync();
        setInterval(sync, CAMERA_SYNC_MS);
    </script>
</body>

</html>
